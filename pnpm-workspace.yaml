catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
  - svelte-preprocess
  - "@tailwindcss/oxide"

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

blockExoticSubdeps: true

trustPolicy: "no-downgrade"
