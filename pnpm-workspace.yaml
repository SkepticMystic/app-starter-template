blockExoticSubdeps: true
# trustPolicy: "no-downgrade"

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.11
  vite-plus: ^0.1.11
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.11

onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
  - svelte-preprocess
  - "@tailwindcss/oxide"

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
