blockExoticSubdeps: true

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.12
  vite-plus: ^0.1.12
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.12

onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
  - svelte-preprocess
  - "@tailwindcss/oxide"

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
